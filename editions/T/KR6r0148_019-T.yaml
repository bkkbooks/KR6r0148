body:
  text: 附錄諸師著述序釋懷悟述昔賢首菩薩於華嚴會中以偈答文殊大士讚菩薩能示同世間云雅思淵才文中王歌舞談說眾所欣信乎文之能顯道濟物也豈獨今之然乎自往古他方佛世無不然耳始余年少時走四方叢林尋訪師友務道專學有效古高世僧萬里求師之志於稠人中沈沈自策其氣志若上將軍負所欲建立邦家之意前邁敵國而且戰且行不遑食息也聞所謂東山明教禪師之高文卓行道邁識遠凡獲見其所著文畫莫不錄敘而祕藏之及於錢唐靈隱山得嘉禾陳令舉所撰師之行業記石刻末云師自定祖圖而下謂之治平集又有嘉祐集總六十萬餘言而其甥沙門法澄克奉藏之以信後世繼聞其廣本除已入藏正宗記輔教編外餘皆在姑蘇吳山諸僧室藏之余固累遣人至彼山諸僧居歷訪之而寂然無知其所在者往往所委不得其人失於護藏而為好事者竊移他所也大觀初余居儀真長蘆之慈杭室於廣眾中得湖南僧景純上人者入予室一日投一大集於席間曰此老嵩之全集也祕之久矣聞師切慕其遺文願以獻師余獲之且驚且喜念茲或天所相而授我耶若獲至珍重寶自皇極中庸而下總五十餘論及書啟敘記辯述銘贊武林山志與諸雜著等約一十六萬餘言皆舊所聞名而未及見者雖文理少有差誤皆比較選練詮次幾始成集庶可觀焉更冀善本較詳莫由得也後又遇周格非出守虔州回得其非韓文三十篇三萬餘言又緣兵火失之遂未能就其集近又得本於禦溪東藍彥上人乃與余昔於匡山所得別本較之文字亦甚疎謬乃以韓文條理而正之然師之著述不得其傳而散落多矣如天竺慈雲法師行狀曲記長水暹勤二師碑誌行道舍利述匡山暹道者碑定祖圖序皆余自獲石刻而模傳之今總以入藏正宗記定祖圖與今文集等會計之纔得三十有餘萬其餘則蔑然無聞矣如令舉所記謂有六十萬餘言者今則失其半矣吁嗟惜哉今以令舉所撰行業記標之為卷首貴在見乎師之世系嗣祖出世去留之迹奇節偉行高才勝德邁世之風焉乃以輔教編上中下為前三卷以師所著之文志在通會儒釋以誘士夫鏡本識心窮理見性而寂其妬謗是非之聲也又以真諦無聖論綴于輔教編內壇經贊後以顯師之志在乎弘贊吾佛大聖人無上勝妙幽遠淵曠之道不存乎文字語言其所謂教外別傳之旨殆見乎斯作矣故其贊末云示法非文字故至人之宗尚乎默傳也又曰聖人如春陶陶而發之也至人如秋濯濯而成之也此謂終歸乎靜默焉故真諦無聖論結云凡聖知覺者真諦之影響妄心之攀緣耳然有志於外文字之學者覽此二說豈不少警于中乎其輔教集舊本以累經鏤板故雖盛傳于世而文義脫謬約六十有餘處今皆以經書考正之覽者可以古本參讀之則其疎謬可審矣今自論原而下至于贊辭約為十二卷次前成一十五卷昔題名嘉祐集者是也其非韓文昔自分三十章今約為三卷次前成一十八卷又得古律及山遊唱詶詩共一百二十四首分之為二總成二十卷命題鐔津文集示不忘其本也然師嘗自謂人生世間閑為第一蓋其自得閒中之趣故其所為之詩雖不甚豐濃華麗而其風調高古雅談至其寫志舒懷有邁世凌雲之風亦可想見其人也觀師與月公晦書自言余志在原教而行存孝論余詳考其書則功在於原教非韓行在於書僧即僧也者孝論德在於志尚遠公而題其影堂文道在於壇經贊真諦無聖論其文之高拔勝邁絕出古今則見乎武林山志故後敘謂因風俗山川之勝欲拋擲其才力以收其景趣也乃作武林山志然求世之知言審音者不亦難其人哉師自携書謁天子宰相而下凡所見則止以正宗記輔教編而投之至於文忠公則特獻之新撰武林山志焉嗚呼文忠公謂文章如精金美玉市有定價非人輒可以口舌輕重之也其重讀徂徠集云待彼謗焰熄放此光芒懸人生一世中長短無百年無窮在其後萬世在其前得長多幾何得短未足憐惟彼不可朽名聲文行然讒誣不須辯亦止百年間百年後來者憎愛不相緣公議然後出自然見媸妍故師之於慶曆間始以文鳴道於天下然當是時也宗儒束教輩是非之鋒謗罵之焰紛然而師終以是道發而著之為高文至論乘風而殄之蔑如也故後世學者有聞其風務其道而矚其文者若脫冥遊望北辰仰昭回也然茲姑以師之經世文章恢弘輔贊吾如來至聖之教之道涉人間世而然也若其自所履蘊操守則瑩然若珠光玉采日精月華而不足以方其溫潤高潔明淨也故令舉記其行業云師之所以自得而樂諸己者蓋不與於此中間雖以護法遭難然其所謂珠光玉采日精月華者世雖見其有烟雲水火焚溺蔽虧之患而其光采精華固瑩如也故師之自携書西上獻之天子事畢將東歸山林而大覺璉禪師賦白雲謠以將師之行云白雲人間來不染飛埃色遙爍太陽輝萬態情何極嗟嗟輕肥子見擬垂天翼圖南誠有機去當六月息寧知絪縕采無心任吾適天宇一何遼舒卷非留迹然則師之風貌聲容其所以出處斷可見也矣紹興改元之四年甲寅重陽後一日書于禦溪東郊草堂之北軒又序師自東來始居處無常晚居餘杭之佛日山退老于靈峯永安精舍默視其迹雖或出處不定然其所履之道高妙幽遠而末路學者器近不能曉悟而師終亦不肯少低其韻以撫循其機因而嘆曰吾安能圓鑿以就方柄哉聞聖賢所謂得志則行其道否則行其言而已言之行猶足為萬世法使天下後世學者識度修明遠邪見而游正途則奚必目擊而授之謂從己出耶因卻關著書以考正其祖宗所以來之之迹為十二卷輔教編三卷又列定祖圖一面書成携之京師因內翰王公素獻之仁宗皇帝又為書以先之上讀其書至臣固為道不為名為法不為身歎愛久之旌以明教大師之號賜其書入藏書既送中書時魏國韓公琦覽之以示歐陽文忠公修公以文章自任以師表天下又以護宗不喜吾教及見其文乃謂魏公曰不意僧中有此郎也黎明當一識之師聞因往見之文忠與語終日遂大稱賞其學瞻道明由是師之聲德益振寰宇事竟遂買舟東下終老于山林師雖古今內外之書無所不讀至於所著書乃廣明外教皇極中庸之道安危治亂之略王刑名賞罰之權而終導之歸於無為寂默之道當世聞人少見其比肩焉而痛以內教自律其身端以儉素誠德為宿歸之地而慕梁惠約之為人也其所蘊至道淵密然以其所學較其所為而未見少差焉所著書觀當世士大夫不顧名實而是己非他也謂以儒而嫉佛乃作輔教編學者亡孝背義循養其所欲也乃作孝論尚綺飾辭章而不知道本也乃作壇經贊苟合自輕而不自上以德也乃題遠公影堂文志其所慕以風末世之華侈也乃作山茨堂序因風俗山川之勝欲拋擲才力以收其景趣也乃作武林山志其明聖賢出處之際性命道德之原典雅詳正汪洋浩渺尤為博贍總號之為論原其如詩書序贊記傳表啟銘誌題述評辯是是非非所謂太山之毫芒耳及後終於湖山而火化不壞者六物天下聞其風莫不東首而長想嗚呼師雲行鳥飛於天地之間視萬乘之尊其勢霄壤之遼也顧王公貴人雲泥之異也一旦以其所為之書獻之天子為之動容天下靡然嚮風而使其乃宗乃祖吾佛無上妙道明白於萬世而卒酬其抱道輔教之志非其自信修誠之效歟後之學者讀其書必有掩卷而三嘆者也嗚呼師之道譽聲德既其超邁故後世學者或當時在位道贊人主師表於天下後世者皆仰而慕之若天雲日星焉故有尋遺風想遐迹瞻頌稱讚不已有若前所記淨因大覺璉禪師將師之白雲謠若江西洪覺範之禮師之骨塔詩若南海楞伽山端介然弔師之古詩凡百韻者西蜀住龍舒天柱山靜禪師遙慕詩而序贊者若靈源惟清禪師之跋詩二手帖而伸贊之者今皆筆之于此或詳或略以備研覽而發季世學佛者之志操焉其淨因大覺璉禪師送師之白雲謠者已見前之後序中此不煩錄矣今既以陳令舉所著之記為前敘舊得一敘不書名不知何人所作或云瑩道溫觀其文藻美麗或近似之他輩不能為也而中間敘其為文之所以而不甚流類不免隨為葺正之仍舊綴于集末云禮嵩禪師塔詩三十乙韻石門釋惠洪作吾道比孔子譬如掌與拳展握故有異要之手則然晚世苦陵夷講習失淵源君看投迹者紛紛等狂顛韓子亦儒衣倔強稱時賢憑陵作詬語到死不少悛後世師韓輩冗長猶可憐趨名不自信泛逐工詞言譁然皇祐初飛聲鬧喧闐田衣動成群怒癭空自懸縮首不暇息兀坐如蹲猿堂堂東山公才大德亦全齒牙生風雷筆陣森戈鋋隱然湖海上長庚橫曉天作書肆豪猛揮斥莫敢前群兒雖貌敬臆論已不專書成謁天子一日萬口傳坐令天下士欲見嗟無緣功成還山中笑語答雲烟我來不及見山水自明鮮入門寂無聲修竹空滿軒永懷翛然姿骨目聳清堅僮奴豈知此住茲亦彌年指余以石塔草棘北峯巔再拜不忍去聽此遶㵎泉吁嗟末運中那復斯人焉文章亦細事清苦非所便但愛公所守遠拍諸祖肩遲遲哦公詩落日滿晴川願持折脚鐺結茅西㵎邊歲時邏松檜來此掃頹磚吊嵩禪師詩并引南海楞伽山守端述建中靖國改元辛巳冬十一月既望余抱遠公文集自廬嶽而東圖入木錢唐布流天下乃特詣師故居永安精舍之後嶺端蒙雪霜排榛莽於所藏闍維不壞之五相舍利小石塔前恭備香羞茗燭等作禮以供焉因抽鄙思為五言古詩凡一百韻長跪端想誠百其心粲若有對遂作南音稽然以諷之庶不忘其本而聊為攀慕悼之之誠也禪師平日有詩云異鄉風俗客不惡但欲南音來耳邊余連與藤東西交徼最為密邇禪師遷寂在於熙寧五年之夏余纔八歲其實忝師里中之晚生所作南音不得不爾苟不離正受庶其裁擇焉覺城否復隍慧日書有食苟無明哲士曷以救顛仄緬惟東山師降靈自天德申甫寧加諸奮身若葡蔔吾法傾不綱蒼黃莫之測詵詵排佛徒岩岩侍君側適操權衡者兼領辭翰職率意務品藻庶形在埏埴唐書預之修韓語例增飾竊自比丘軻拒我過楊墨惜彼述至言曾之通皇極廢道專以人訐惡肆其力坑焚必有待伐削豈容刻愚俗初易欺聖主終難惑當時禪講輩動類百千億獨誰敢枝梧縮手俟徽纆唯師奮然作感憤形諸色一言塗腦肝萬卷羅胸臆人爵猶唾遺冥鴻詎籠得蠢蠢嗟東人遲遲別南國歷楚仍騁吳百城慕知識義龍雲之天禪虎角而翼誅茆靈峯西殺簡仙源北著書傚龍猛護法掌司直正宗序昭穆原教辯離即謂儒釋二教雖殊皆相資而化物也筆峯迴崷詞海彌湢㳁紛葩若輝散宏麗尚典實匠媧補穹旻効禹導溝洫動或幾百卷經世為模則斯文千古雄斯義萬夫特據理從所征處戰無弗克吾皇遇唐虞吾相遭禹稷抱書乃西獻乘時闢凶塞喜覽明光殿撫念加歎息賞其繫表才欝為天下式謂嘗獵英雋忽此遺彀弋小避三公位高憑四依軾慧日昏復明禪經亂還緎智林久宜茂福田廣須植大信過豚魚至仁周動植良可班諸藏尋即遵所勅略去五韻飛章類席卷橫議同鏡拭舂喉那補爨樹口拑拱默始知猛陵翁即師里名彼多獮猛陵男子故原筮無遺慝金湯義存存涇渭情湜湜略去二韻既而謂東歸湖山夢還憶列戶翠可染當窓秀堪織風尚清散為僧年白駒逼孰貴秉燭遊鼓缶欹吳日林遠爭追隨宗雷苦凄惻禪誦心稍隙騷雅興仍亟道行愈峻卓德聲轉輝赩略去七韻宴坐君無何遺偈見敦飾大梅鼯鼠聲匪我相囚福師臨終偈云不似大梅老貪隨鼯鼠聲云奄然遂長往休徵難具仂明發鷲峯下闍維火初熄五相堅不化鮮柔光燿翌燦若金出䤵瑩如玉分玏式旌無妄犯奉法剛而㥶靈山眾咸覩望林加渴醷剋奇冠前籍景仰動殊域王公競嗟駭士庶增悃愊略去二韻共收鶴林骨合葬鷲山肋略去三韻㵎猿徒自號書魚蠹誰蝕僧史半十料工歌全九罭略去六韻致我來吳楚慕師自岐嶷獲記楞伽遊誦味踰鱠職師有遊吾湟川燕嘉亭及楞伽山寺記也哲人既云殂至道亦將踣已乎三十年臨弔徒深剋妙峯高為塔梵天廣成國國或作異萬物備蒸嘗五雲爭輔翊乾坤或幾息海山有時泐師其道與名勃然長觺觺命研味其詩雖風調氣韻高爽酋勁而中間凡用事綴韻過于迂辟今略取其辭意簡雅超邁之句次成七十三韻亦可見其才志向慕之誠至焉贊明教大師并敘龍舒天柱山修靜述始余讀嵩禪師輔教編愛其文落落有奇偉氣而能發揮釋氏之道以諭夫當世名儒釋子之不知教本者俾之達性命之奧見聖賢所以施教敷化之心而不淪於是非相戰之地中間敘繁處皆略之若夫統之有宗而窮深及微則尚恐二家之學者或未易曉其邊徼況能究其道而見其全乎及其示寂後闍維而五物不灰然此雖師之糠粃而以歿故已方見信於其徒則其所蘊精粹要妙而不獲見知於人者多矣嗚呼道之難傳也若是乎予甚悲之其道雖能化當世名儒而不能盡化其徒故師歿後其真風勝軌不甚章章絢爛於世茲或希世之才黃鍾之音不投於里耳小器哉予晚路末學不遑洒掃于庭宇而覘望餘光徒臨風揮涕有胡不萬年之歎也今採其遺芳稽首長想系之以贊云藤山之東紫雲浮空爰有僧龍名配維嵩自脫襁褓居仁由孝氷雪其躬律儀是傚遠覽高翔遊吳暨梁道繼佛祖欲隱彌彰適丁祇園謗焰四起縱筆成書蓋不得已既而撲滅曇花重榮嘉祐之間獨飛英聲帝澤屢霑公卿折節咄嗟吾徒反肆駃舌遂賦歸歟安於覆盂少林食毒異軌同途小智自賢所在成市頎然誰儔理固宜爾太阿出匣斬蛟戮螭用之補履曾不如錐答焉云逝遺迹莫繼凜乎真風永蠲氛翳嗟乎鯫生不克祇承每一念至氣填于膺竟何能為只益慚怍聊筆清芬式告來學題明教禪師手帖後二首靈源叟吾佛大法蓋世出世間千聖萬靈道德性命之本源源深本妙非思議可及其應緣揚化也當必資開士因王臣之力啟物信而禦外魔開士出蓋視法運之通塞決與世致益不苟然也藤州明教大師嵩和尚其人歟妙達玄宗博極世解出皇祐至和間見外黨有致吾法之瘡疣者則曰予竊菩薩權為如來使辯而明之以度彼惑俾歸正趣實所任職矣於是著書聞奏蒙仁宗皇帝嘉賞勅入經藏班行天下於是魔雲廓而佛日輝也和尚既建功德於教門其英聲茂實壯飾其曹稍蘊知識舉知欽慕而比年法值下衰人根鄙劣喜剃染之便爭變形服竊入吾家紛情世塵濫廁僧倫者皆是見聞思慮不脫俚俗何高德勝義之能講慕哉寶因擇言上人當此時能竦所聞而矜所慕其賢於濫廁之流者故可稱也雖久游禪林服業祖道而於弘教大士知開導耳目起睎𭿮之志也故在京師聞律僧有上世與明教相厚善者乃訪問之彼為道前事且出此帖示之擇言苦求得之珍收南來以示余若有異獲因語之曰汝企其人而重其遺迹以彼名耶實耶以名則於彼外矣徒可資於談柄無益乎己以實則明教之至論可考以發覆致遠者甚多汝宜尋而究之且想彼標致以自勉激則終有益也矣年月日又帖明教大師嵩和尚自稱藤州東山沙門乘夙悲誓出于皇朝始以天下縉紳先生或未究我法大道之源而域守所習跡佛教為夷狄之法而篾視之至加毀滅謂無使混害中國周孔之道和尚惜彼循枝而遺根背源而向派非徒謂暗乎此其學周孔之道也可得謂能自其明而極其誠由其誠而盡其道以成天下大本大公包博無外純全之妙神者耶由於不自知所以不知人矣和尚博極古今儒釋教道之本會通聖賢理事論議之跡若振綱張網舉領提裘目分毛斂見者皆明義貫理融感會神府乃知凡聖人所出之方所示之言特其教之跡矣使知識之明者由此自返所以跡所以言者以內照之則靈于廓然無內外無彼此豈華夷儒釋之可辯耶乃著之書號輔教編以開諭縉紳先生之徒奏之天子上嘉歎之勅與班行而名卿鉅儒至如歐陽文忠公諸豪覽其書莫不歎服敬而禮之復緣淺識講解輩毀其宗門故撰正宗記定祖圖以辯其說亦奏上行之既而還東吳示滅靈迹甚異具如傳記其牆岸法門啟迪信路雖古高僧之雄者不過爾耳禪人寶智得其遺帖求跋故援毫信手愧不能述其萬一也靈源叟書至聖至言回偏樹正皇天皇覺決淺賾深大哉善哉福霑諸後重刊所疏續繼斯云鐔津集重刊疏夫明教大師乃是大乘菩薩知佛法有難於是乘大願輪復生世間著書輔教者也昔宋之鉅儒縉紳先生嘗評其文曰不惟空宗通亦乃文格高斯言是矣歐陽子云不意僧中有此郎耶當時排佛之心已廓然熄滅而無餘矣古今僧中之為文者多而未嘗有出其右者所謂北斗以南一人而已自昔兵變已來書板磨滅後之學者無所見聞為可憂也茲欲重刻吳中所費繁夥於是綴疏仰謁群賢同道學者覩茲勝事得無慨然贊助者乎為因緣而出現世間咸宗鷲嶺以文章而黼黻聖諦惟尚鐔津深窮萬法之原同入三乘之藏讀之可以開人天之眼目統之可以掃儒釋之藩籬好書而不好此書孰謂好學明道而不明斯道豈曰明心欲重刻雲間益廣傳于天下致永叔黎明之見名重一時遭仁宗天縱之資功垂萬古群賢既遇勝事當成洪武甲子春天台松雨齋沙門原旭撰右松雨老和尚為琦首座製疏重刊宋明教大師文集於雲間既以化行開至二十餘版矣適琦公疾作不克成其事茲以天全叡首座愍邪法增盛發堅固志繼其芳猷一日持此卷過余堅密精舍命題于後余雖不敏覩此勝因不覺踴躍而喜此集湮沒久矣若使竭力成就大行于世正所謂揭慧日于中天耀昏衢於叔世者也天全其勉之永樂三年冬嘉興府僧綱司都綱天寧弘宗書重刻鐔津文集後序學有及物之功文為載道之器學而不能利乎物徒學也文而不能衍乎道空文也若夫推其道發於文章肆其學以援斯人宋明教嵩禪師其人歟嗟夫吾佛之教法心法也生靈同而有焉但為虛妄所蔽不能顯現汩四生淪六趣何由得已哉而吾佛愍之以此心法隨器而諭俾各得乎本有或者不仰恩懷德反生譏毀是則自毀其心非毀其教法也教中所謂世智辯聰八難之一且不信而毀又非虛妄所蔽若虛妄所蔽或能了妄即真不信而毀則自昧其心自昧其心猶種之敗芽之焦不復有發生之日矣得不尤可愍哉而明教性稟生知能體佛意學則必欲援世非徒學也文則必在明道非空文也況是時天下學士宗韓氏以拒我故勸書原教諸文不得不作焉學者總號鐔津文集斯文行世真救世明道之要術也可一日而無哉舊版湮沒人皆痛惜嘉禾天寧首座天全獻公乃東海慧眼弘辯禪師之弟子施衣資重梓流行其亦明教之心也歟板既成請敘其後蒙晚生讀其文集有不得執筆從游之歎今獲廁名于後不亦大幸乎不亦大幸乎永樂八年歲在庚寅夏四月初吉浙江杭州府徑山禪寺住持沙門文琇
