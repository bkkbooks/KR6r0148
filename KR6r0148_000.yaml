  text: 鐔津文集目錄卷首行業記此即序陳舜俞撰卷一輔教篇上原教勸書并序共四篇卷二輔教篇中廣原教并序共二十六篇卷三輔教篇下孝論并序共一十三篇壇經贊真諦無聖論卷四皇極論中庸解五篇卷五論原共四十篇禮樂大政至政賞罰教化刑法公私論信說命皇問卷六論原問兵評讓問巽說人文性德存心福解評隱喻用物宜善惡性情九流四端卷七論原中正明分察勢刑勢君子知人品論解譏風俗仁孝問經問交師道道德治心論原畢雜著六篇記復古文說議旱對夷惠辯唐太宗述易術解卷八雜著六篇逍遙篇西山移文哀屠龍文記龍鳴寂子解寂子解傲書萬言書上仁宗皇帝卷九書再上仁宗皇帝書啟共十三封上韓相公四封上富相公上張端明上田樞密上曾參政上趙內翰上呂內翰上歐陽侍郎上曾相公謝李太尉卷十書啟狀與關彥長祕書答茹祕校書與章表民祕書與章潘二祕書與馬著作書與周感之員外答王正仲祕書受佛日山請先狀上蔡君謨侍郎與通判而下眾官與諸山尊宿僧官與諸檀越書赴佛日山請起程申狀接杭州知府觀文胡侍郎先狀接錢塘知縣先狀接大覺禪師先書謝王侍讀侍郎謝沈司封提刑謝王密諫知府惠詩與瀛州李給事與廣西王提刑與陳令舉賢良與潤州王給事與王提刑學士與陸推官與張國博知縣謝錢塘方少府謝仁和趙少府謝沈少卿見訪與祖龍圖罷任杭州送詩與楊公濟還章監簿門狀與石門月禪師與黃龍南禪師別幅答黃龍山南禪師次幅與圓通禪師又與圓通禪師答圓通禪師讓院答萬壽長老與萬壽長老謝杭州寶月僧正退金山茶筵回答與東林知事與楚上人發供養主與檀那卷十一敘共二十三篇傳法正宗定祖圖敘與祖圖上進六祖法寶記敘明州良和尚語錄敘武陵集敘原宗集敘移石詩敘法雲十詠敘法喜堂詩敘山茨堂敘趣軒敘山游唱和詩集敘山游詩後序與月上人更字敘周感之更字敘送潯陽姚駕部敘送郭公甫朝奉詩敘送王仲寧歌敘送周感之詩敘送周公濟詩敘送周感之祕書南還敘送林野夫秀才歸潮陽敘送梵才吉師還天台謌敘送真法師歸廬山敘卷十二志記銘碑共一十二篇武林山志游南屏記解獨秀石名無為軍崇壽禪院轉輪大藏記漳州崇福院千佛閣記泐潭雙閣銘清軒銘南軒銘舊研銘題荷香亭壁文中子碑天竺慈雲法師曲記卷十三碑記銘表辭七篇秀州資聖勤禪師塔誌銘秀州資聖暹和尚影堂記故杭州靈隱普慈大師塔銘石壁山保聖寺故紹大德塔表致政侍郎中山公哀辭李晦叔推官哀辭周叔智哀辭述題書贊傳評共十二篇秀州精嚴寺行道舍利述廬山遠公影堂題梅福傳後書文中子傳後書李翰林集後書諸葛武候傳書范睢傳後段太尉傳贊好善贊陸蟾傳韓曠傳評北山清公書卷十四非韓上第一并敘卷十五非韓中第二至第十三卷十六非韓下第十四之三十卷十七古律詩共六十首卷十八與楊公濟晤冲晦山游唱和詩共六十九首卷十九附錄諸師著述禦溪東郊草堂釋懷悟序又序瑩道溫作石門惠洪禮嵩禪師塔詩三十一韻楞伽山守端吊嵩禪師詩一百韻又引龍舒天柱山修靜贊并引靈源臾題明教大師手帖後二首天台松雨齋原旭撰并敘疏語嘉興都綱天寧弘宗指南序杭州徑山住持文琇序鐔津文集目錄畢鐔津明教大師行業記石刻本在杭靈隱山尚書屯田員外郎陳舜俞撰宋熈寧五年六月初四日有大沙門明教大師示化于杭州之靈隱寺世壽六十有六僧臘五十有三是月八日以其法茶毘斂其骨得六根之不壞者三頂骨出舍利紅白晶潔狀若大菽者三及常所持木數珠亦不壞於是邦人僧士更相傳告駭歎頂禮越月四日合諸不壞者葬于故居永安院之左其存也甞與其交居士陳舜俞極談死生之際而已屬其後事茲用不能無述也師諱契嵩字仲靈自號潛子藤州鐔津人姓李母鍾氏七歲而出家十三得度落髮明年受具戒十九而遊方下江湘陟衡廬首常戴觀音之像而誦其號日十萬聲於是世間經書章句不學而能得法於筠州洞山之聰公慶曆間入吳中至錢塘樂其湖山始稅駕焉當是時天下之士學為古文慕韓退之排佛而尊孔子東南有章表民黃聱隅李泰伯尤為雄傑學者宗之仲靈獨居作原教孝論十餘篇明儒釋之道一貫以抗其說諸君讀之既愛其文又畏其理之勝而莫之能奪也因與之游遇士大夫之惡佛者仲靈無不懇懇為言之由是排者浸止而後有好之甚者仲靈唱之也所居一室蕭然無長物與人清談靡靡至於終日客非修潔行誼之士不可造也時二卿郎公引年謝歸最為物外之友嘗欲同游徑山有行色矣公亦風邑豪預焉冀其見仲靈而有以尊養之仲靈知之不肯行使人謝公曰從吾所好何必求富而執鞭哉凡其潔清類如此皇祐間去居越之南衡山未幾罷歸復著禪宗定祖圖傳法正宗記仲靈之作是書也慨然憫禪門之陵遲因大考經典以佛後摩訶迦葉獨得大法眼藏為初祖推而下之至于達磨為二十八祖皆密相付囑不立文字謂之教外別傳者居無何觀察李公謹得其書且欽其高名奏賜紫方袍仲靈復念幸生天子大臣護道達法之年乃抱其書以游京師府尹龍圖王仲義果奏上之仁宗覽之詔付傳法院編次以示褒寵仍賜明教之號仲靈再表辭不許朝中自韓丞相而下莫不延見而尊重之留居憫賢寺不受請還東南已而浮圖之講解者惡其有別傳之語而恥其所宗不在所謂二十八人者乃相與造說以非之仲靈聞之攘袂切齒又益著書博引聖賢經論古人集錄為證幾至數萬言士有賢而好佛者往往詣而訴其冤久之雖平生厚於仲靈者猶恨其不能與眾人相忘於是非之間及其亡也三寸之舌所以論議是是非非者卒與數物不壞以明之嗚呼使其與奪之不公辯說之不契乎道則何以臻此哉雖然仲靈之所以自得而樂諸己者蓋不預於此豈可為淺見寡聞者道耶仲靈在東南最後密學蔡君謨之帥杭也延置佛日山禮甚厚居數年然言高而行卓不少假學者人莫之能從也有弟子曰慈愈洞清洞光所著書自定祖圖而下謂之嘉祐集又有治平集凡百餘卷總六十有餘萬言其甥沙門法燈克奉藏之以信後世云熈寧八年十二月五日記
