body:
  text: 藤州鐔津東山沙門契嵩撰古律詩共六十首三高僧詩并敘唐僧皎然靈徹道標以道稱於吳越故諺美之曰霅之晝能清秀越之澈如氷雪杭之標摩雲霄吾聞風而慕其人因諺所謂遂為詩三章以廣其意也霅之晝能清秀晝公文章清復秀天與其能不可鬪僧攻文什自古有出拔須尊晝為首造化雖移神不遷晝公作詩心亦然上跨騷雅下沈宋俊思縱橫道自全禪伯修文修或揮字豈徒爾誘引人心通佛理縉紳先生魯公輩早躡清游慕方外斯人已歿斯言在護法當應垂萬代越之澈如氷雪澈公之清若氷雪高僧天資與人別三十能詩名已出名在詩流心在律不殊惠遠殊惠休皎然未合誰與儔白雲蕭散何定止忽入關中訪包李孤清難立眾所沮到底無辜中非語木秀於林風必摧澈公懷德成禍胎古人已往不復歎為爾為詩遺後來杭之標摩雲霄標師之高摩雲霄在德豈在於沈寥一庵嶺底寄幽獨抗迹蕭然不入俗有時虛陟層崖眺不聞其語聞清嘯當時陸羽事幽討曾入青雲預聞道取雨救旱驅神龍此與人間事豈同冥機感異心之苗此公所以稱道標送章表民祕書一日夫子來山陲來言去別將何之清塵舊尉亦皆至時周感之同來鮮車輕珮光陸離入門顧我顏色好林下把袂相追隨笑傲恣肆意氣豪舉首不覺白日欹拂榻乃留嵒宇宿紙衾蒲席誠可嗤不計豐約但適美唯唯無語相拒違是時春和二月半永夜耿耿輕寒微高談交發雅興合如瓶注泉爭淋漓須臾促席命言志直吐胸臆撝淳詞人心不同有如面平生各自有所為表民卒然趨席端曰吾有志人不知末俗淺近烏足語含哺未吐長嗟咨少從先生學經典不探枝葉窮根基帝王之道斷可識殷盤周誥無復疑古今事業貴適用文意述作須有規豈類童稚空琢刻畫餅不能療朝飢十五孜孜事文字磨礱筆硯精神罷長篇大軸浩無數慷慨但欲扶政治前年補吏來浙右局務冗俗不可窺傾懷欲效王略騏驥捕鼠非宜宜錢唐大府多達官品秩相較我最卑孟軻獨負浩然氣誰能斂袂長低眉丈夫所重以道進青雲萬里須自馳咄嗟顧我胡為者甘以門廕為身資遂為謝病遠引去遽與簪組相差池膠西董生苟可慕下帷克苦窮書詩閒居落莫多感激所感時政生瑕玼賤臣抱節私自效作書萬字投丹墀天閽深岩在西北引領一望雲𩅰𩅰德音畢竟不下報漫陳肝膽空涕洟嗟嗟吾生時命謬不遇當時甘佚遺龍蛇之蟄尺蠖屈萬物不時須自怡我家田園在南國亦有溪山名武夷泉甘壤黑堪稼穡歸與老農事鎡基余與感之聞此語精神飛動驚支頤深謀遠慮不可測滄溟無底天無涯閶闔門前無限客摩肩踏足爭前詞暖衣飽食恣氣艶幾輩卓犖能如斯請君更前與君語何必輕沮煩孜孜嘉冬收槿朝發眾物榮茂有疾遲不聞伊尹五干湯堯舜之道方得施賢傑輕身重天下豈使汲汲營其私況當夷狄侮中國蹂踐二鄙翻地皮將軍誅討苦未剋百萬師老勞旌旗凶年樂歲復間作風雨霜雪猶不時天子勤政不暇食亦待才能相補裨廟堂之上有君子聰明豈肯饒臯夔執秉公道尊大匠裁度杞梓寧參差愛君為人性疎達不以其教交相訾臨風明月千里別祝祠豈憚傾肝脾俗人好毀寡樂善嘉名清節慎莫虧朝廷若問平津策賢良第一非君誰古意五首風吹一點雲散漫為春雨洒余松柏林青葱枝可取持此歲寒操手中空楚楚幽谷無人來日暮意誰與二君莫笑支許寂寞非愚懵君莫輕稽阮山林有清興人生徒百歲樂少憂還剩萬事漫短長無如使道勝爾非傲世士高蹈釣名稱但謝區中緣甘心棲石磴澄空白日飛世事終無應不如省爾誠自言還自贈三雲中見雙鳥高飛揭日月毛羽賁文章翱翔異鷹鶻翛然邈千里竟不顧林樾春風漫飄颺勁翮更超忽陌上遊俠子窺爾徒倉卒雖有金彈丸睥睨不敢發因知奇異資自保長超越回視黃雀群胡為戀塵𡋯四堪笑浮雲高凌虛翳日星凌虛或作扶搖寧作蘭蕙幽草中自芳馨自足乃天分未需爾虛靈掩翳之所惡胡為久亭亭古來曠達士浪跡多晦暝山林惜長往藏用亦藏形愚谷不可及窅然還自寧嗟余亦羨此岑寂養頹齡五窮品偶真叟授我一卷書深林值幽人遺我斧與鋤斧鋤亦奚為教養材與蔬荒穢必須剪使之藹自如授書欲胡為教爾心與軀學必先正己自治乃及餘此意有嘉訓佩之未始除如何悠悠人自謬欲是渠相習成薄俗尠德懷蘧篨吾裁此俚語憑君為傳諸游龍山訪道士李仙師日出野曠明肅然訪道生杳渺湖外去散誕雲邊行秋高天宇淨脫葉飛縱橫乘風度林嶺轉覺衣屨輕時聞縹緲間微颷傳鶴聲知與仙家近逸思泠然清須臾轉幽谷紫府芝田平仙童走脚報松子來門迎接袂語且笑所歡非俗情丹臉人未老道貌天已成開筵羅玉粒盤餐饈紫英綢繆似交舊洒落懷抱傾薄暮忍云去徘徊倚山楹欲有重尋約還憂變高名感遇九首海水晦夜清秋色涵蓬壺有叟雙龍公鐵網羅珊瑚風雲浩容與悵恨何所圖欲問天上人可換明月無二仙人白玉京去去何縹緲瓊樓十二層玲瓏汎雲表銀湟月為波萬頃即池沼秋來宮殿光逗落人間曉空際時澄明烟霞眇青鳥可見不可到所思空杳杳三悠哉楊執戟識遠才絕奇初提草玄筆頗為人所嗤卓卓孔孟道謝爾平嶮巇玉鑑含幽光千載方葳蕤寄語曠懷士未達休嗟咨心期道自貴俗態勢焉隨青山保長往白日貞可窺高標謝松柏孤芳操弗移四天威不到處干戈動邊鄙將軍奮威猛英雄勢隨起紛紛出榆關肅肅秋色裏白馬冐黃雲清霜厲嚴旨少壯羽林兒務能莫多喜好武匪君心用兵不得已寄言飛將軍妙略應無比志在報君恩豈為黃金死丈夫身許國慷慨當如此寧教太史書輕笑魯連子五蒼茫天地間流光一何遽曾聞太古人未見曦輪駐才沈崦嵫雲還上浮桑樹山色愁裡暝天形夢中曙安知穆天子龍馬神為御萬里速乘風又向瑤臺去超遙侶神仙此理當何故不向堯年長永使人間住六冠蓋何處客凌雲意氣驕旦旦趨雙闕衝衝過渭橋金珂雲外響畵燭月中燒縹緲行天路升騰在玉霄如何區宇內頓與人間遙長拂羅裳去明光殿下朝一俯復一仰榮多憂亦饒白髮領邊長朱顏鏡裏凋豈知松檜下幽人長寂寥萬事淡無慮恣臥時長謠浩蕩天地間孰問犧黃堯臨風一清嘯胡為王子喬七空虛澄遠煙霽色含秋景思君每盤桓駐目千峯頂駐目或作獨往明月初團圞可照美人影美人來不來雲霞渺林嶺八松柏地之靈草莾亦同茂願得區域中人心復純素蒼梧會稽陰罔復有陵墓六合無知音青山有歸路人生惜朱顏賢照長相顧昨夜露華臺誰不怨秋暮九悠然嚴子陵遠大寥廓器故人貴為君白駒要不至耽閑戀淥潭高超弄芳餌青山汎白雲萬古寄高意侯不知道初亦嫌傲志何事卑王侯其心越天地因悲婁護輩胡為附權勢流游絳灌間折節蹁蹮例皇皇古皇道勞生自拘繫不如歸去來乘風拂長袂懷越中兼示山陰諸開士厭見人境喧清游憶靈越東南千萬山浮青滿寥沈從來鑑中景形勝人間絕月湛換鵝溪雲起藏書穴客子若飄蓬遽與故人別尺素未及通芳草已云歇所悲行路難俯仰損名節鳴雁欲東飛寄語謝明月早秋吟山家昨夜房櫳冷梧桐一葉飄金井長天如水淨藏雲明月含暉變秋景桂枝花拆風飄飄誰在高樓吹玉簫人間不見槎升漢天上將看鵲作橋年少征人在何處白露霑衣未歸去海畔今無漂母家江南誰與王孫遇徘徊月下空長吟吾徒自古難知音欲上高臺問明月明月何不照人心群賢宿山賦得暮雲嵒下宿微風靜林杪紅日下嵒阿明月出已滿白雲歸未多高應伴猿鶴深不暗松蘿若弗為霖去其如旱歲何浙江晚望暮色看無際秋空水混天片帆飛鳥外新月落潮邊隔越山形小吞吳地勢偏幾人來往老早晚渡頭船題徑山寺翠拔群山外連天勢未休雲迷飛鳥道雨出古龍湫僧在深雲定香和杳靄浮人間游不到臺殿自清秋郎侍郎致仕平時獨高謝道勝欲韜光白髮辭明主青山戀故鄉藥畦容鶴到吟徑恐雲藏更愛禪林臥時來拂石床山中早梅亭亭映晚景皎皎出林端小圃連雲淡孤芳冐雪寒人間殊未見物外最先看但欲方瓊玉寧將勝牡丹汎若耶溪越水乘春泛船窓掩又開好山㳂岸去驟雨落花來岸影樵人渡歌聲浣女回滄浪無限意日暮更悠哉書毛有章園亭愛此園林好重來花木滋游人醉不去幽鳥語無時烟郭連芳草春湖泛淥池松篁非俗韻游子漫相期山亭晚春山庭晚來靜林石自巉嵒犬去吠人語花飛恣鳥䘖晴烟熏茂草煦日靄高杉更喜團圓月清光下碧巖自贈靜坐還看竹閑行亦合樵道心應有在生事合無憀客去清談少年來白髮饒漫將支遁筆閒且賦逍遙夏日無雨山中苦無雨日日望雲霓小暑復大暑深溪成淺溪泉枯連井底地熱亢蔬畦無以問天意空思水鳥啼俗謂水鳥啼則天下雨焉歲暮書懷朔風適變寒曉日將含煦南國殊未還東山歲云暮浮生奄忽往芳顏安得駐寄謝人世間紛華尤可悟山中早行前山經夜雨獨往步春泥天岸日將出田家雞更啼孤烟行處起曠野望中低猶喜逢樵客相將過數溪湖上晚歸人間薄游罷歸興尋舊隱春岸行未窮夕陽看欲盡嵐光山際淡天影水邊近自憐幽趣真清吟更長引季春寄友生湖上無烟晝人間寒食時陰晴春易變花月候難齊未畏青蛙亂先愁紫蕨衰雲山向漸熱相訪勿應遲寄懷泐潭山月禪師聞道安禪處深蘿杳隔溪清猿定中發幽鳥坐邊栖雲影朝晡別山峯遠近齊不知誰問法雪夜立江西送客還北闕道中作北郭送陽子日斜歸舊居路泥侵曉潤晦月逼春餘桑柘雨中綠人烟關外疎依然見風俗歸興混樵漁次韻無𧦬赴承天再命載命還高讓知君所趣深青山當隱處白髮欲栖心更俟逢梅雨何妨過虎林潺湲合㵎水六月足清音山舍晚歸薄暮還精廬徐行無所並日入月還清山空水更靜彷彿聞疎鍾翛然在西嶺寄語高世流來茲謝塵境讀書讀書老何為更讀聊遮眼此意雖等閒高情寄無限錯磨千古心翻覆幾忘飯不知白雲去春靜山中晚送廬隱士歸廬山世事如循環是非終莫盡羨爾歸深山任他譏小隱黃鵠舉已高白雲去非近天籟歸寂寞何峯弄清軫還南屏山即事歲晚歸來石室寒松蘿岑寂自盤桓但知林下一年過不見人間萬事難招隱有詩題石記解嘲無說與時看此心已共空生合身似浮雲不必觀入石壁山身似浮雲年似流人間擾攘只宜休老來已習青蘿子隱去應追白道猷直入亂山寧計路定看落葉始知秋他時谷口人相遇莫問裁詩謝五侯山中自怡謝所知萬事隨宜勿強攀暫過朝市即歸山勞生未必浮名好稱性應須到處閑都似夢中休問影只堪吟裏更怡顏襄陽道者寧知爾猿鶴蕭然石室間寄承天元老清散年來事益閑不論林下與人間禪心至了非喧靜默客何妨更往還奇石清軒增勝趣流泉碧座照衰顏支形脫略時機甚應笑歸來別買山誡題因事高吟遠矚倚雲梯往事經心盡可題道德二篇徒自辯是非一馬豈能齊暉山真玉傷驚火失水靈蛇畏在泥寄語冥鴻上天去凌雲羽翼莫思低元日暗裏春催曙色明百雞迎曉報新聲宿寒尚在龍蛇蟄藏曆初傳日月迎萱葉四時今始發梅花一旦占先榮山家也祝堯天壽漫學牛山報太平著書罷思南還復會客自番禺來因賦此詩平昔著書今粗畢南還終欲隱羅浮初春況遇故鄉子終夜更誇滄海遊但貴羊城風物好豈辭梅嶺路岐修應須相與葛洪輩抗迹山林送白頭冷泉獨賞寄冲晦上人南風掠波溪水滿山中幽人來洗浣獨立溪傍清興欵更愛泉流芳草短平生幽討貴蕭散世道紛紜何足算人間五月夏雲煩相約歸來君莫緩遣興三絕逸興應須傚皎然此生瀟洒老詩禪何妨剩得驚人句詠遍江山一萬篇吾道陵遲事事訛而今無計遏頹波徇人玩法成流俗但泣金書柰爾何去年聊駐江頭寺今寄林僧嵒下扃莫謂此身無定迹人生都類一浮萍書南山六和寺青葱玉樹接溪岑臺閣凌虛地布金行到白雲重疊處水聲松韻淡人心寒食日雨中漠漠行雲晴復陰野花垂濕晚沈沈游人莫怨天多雨況在東臯春已深早起天窓月過星疎渺檐際冥分雲窈窕山家深處勿雞啼時有寒鵶來報曉對喜鵲靜臥時驚鵲喜多須臾果有故人過山中明度還無事問爾綿蠻更語麼寄晤冲晦年老相看眼倍青念君詩思苦勞形人間更有無窮感好把禪關護性靈洗筆古人信文字字字從此出天下心不欺爾亦有陰隲濯之遺孺子念茲未應失遊大慈山書晝上人壁谷裏侵雲寺尋幽到深處春過寒花開人來啼鳥去豈期草菴客日暮此相遇清溪勿謂清溪清長如鏡初洗須防苟容物污爾清到底
