body:
  text: 藤州鐔津東山沙門契嵩撰此與楊公濟晤冲晦山游唱和詩今總編于此貴後賢披覽以見一時文會之清勝焉歲暮值雪山齊焚香獨坐命童取雪烹茗因思柳絮隨風起之句遂取謝道蘊傳讀之見其神情散朗故有林下風氣益發幽興乃為詩兼簡居士公濟彼上人冲晦東山沙門契嵩上簷外驚風幽鳥歸窗間獨坐事還稀初看曆日新年近喜見山林驟雪飛但憶故人能有詠寧懷久客此無衣鮑昭湯老能乘興城郭何如在翠微章安楊蟠次韻零落東山老佛師古來獨往似君稀雪邊氣候春將破林下神情句欲飛後日當尋慧遠社何人更贈大顛衣一篇感發渾間事須脫青衫動少微錢湖草堂沙門惟晤次韻上雪滿西山春未歸泉聲凍咽鳥聲稀靜觀眼境人間渺驅逐詩魔天外飛一飽每將松作飯大寒重換紙為衣我憐詩是君家事更約論心極細微約冲晦宿東山禪寺精舍先寄蟠上人合動林間興吾恨衰遲學謝安納屐操笻郍有限吹雲落雨漫無端先憑報信春枝破預想分題雪屋寒林下不諳人世苦笑將雙鬢與君看次韻和酬契嵩襄陽習子不貪官欲友幽人擬道安冒雪履霜臨歲杪攀蘿挽翠到雲端初論浮世慚年老久對清規苦夜寒空感知音何以報但誇山水富君看將訪永安東山禪師先寄惟晤庵在千株松桂下更無塵事到夫君高縱罕過呼猿㵎靜思唯看抱石雲日暮坐間禽影集雪晴岸畔路形分楊雄約我須投宿月裏禪餘怯論文次韻和酬契嵩歲晚陰沈天宇昏宗雷訪我更携君相期石屋宜投宿獨憩山茨學臥雲雪映窗𣠄人已靜風吟燈影夜初分自憐惠永多間散強接清言愧不文宿永安方丈書呈東山禪師蟠千年道在高僧傳未論詩人更有評曾著文章原大道獨推性命濟群生白雲已鎖山間寺流水空傳世上名林遠不聞鐘磬作五更幽鳥轉春聲次韻和酬契嵩詩豪何遜宿嵒扃品格高卑徹曉評未省窗前無月到唯驚席上有風生郤超年少遍高隱莊子才雄不近名明日君歸人落去莫將平叔擬虛聲次韻奉和惟晤道安獨繼襄陽踵詩好慵窺霅晝評竹屋數間經幾載草衣三事傲平生縱陪林下收孤迹難學人間走大名燈火已殘談未倦曉風斜雨打窗聲嘉公濟冲晦見訪契嵩數曲青溪山數重山深日暮已鳴鐘忽聞行客門前語來覔幽人林下蹤初接風流殊歷落更張燈火倍迎逢不須便去疑無待已有黃糧在宿舂次韻和酬蟠數百招提隱亂峯蒼茫豈復辨君鐘春含未得黃鸝報路轉唯尋白鹿蹤庵在月邊長不鎖興來天外忽相逢山人莫笑衣冠客亦有鴻來待賃舂次韻和酬惟晤白雲蒼海一重重傍舍遙聞隔塢鐘月上更無人語鬧雪深空認虎行踪詩書共喜燈前論茗果翻疑夢裡逢脫屣高談無限樂熅爐寒擁日高舂遊靈隱遇雨呈普慈及二詩翁蟠山老未容山客去故將雲陳鎖山門雨催晚色凝諸嶺雷送春聲落後村今夜青林妨月上故人白首把詩論來朝山水終瀰泛策杖相隨討㵎源次韻和酬契嵩暮雲將雨苦紛紛看雨携君倚寺門飛鳥驚雷歸後塢落梅流水出前村名山當爾何須去勝事而今更好論況有禪翁通妙理徘徊重欵扣真源次韻和酬惟晤雨洗群山秀色分一笻雙屐到松門天邊雲散爭歸洞島外樵還各占村久著青袍心已厭相看白首事休論請君細問黃梅老當信禪河別有源同公濟冲晦宿靈隱夜晴契嵩不睡還烹北苑茶寒燈落盡適來花夜深雨過山形出天淨雲空月色佳且喜僧窗晴似晝莫論人世事如麻況陪支許皆能賦豈厭留詩在碧紗次韻和酬蟠山風亦會山人意卷盡天紛掃雪花明月當樓情已興碧雲落紙句還佳天威忽霽應通物仙侶相便合姓麻群動已消林木響臥看星斗隔窗紗次韻和酬惟晤戰退睡魔重酌茗再披文卷眩生花喜逢長夜身雖健勉和新詩興未佳風細猿聲清似梵月明杉影密如麻臘寒燈炷飛蛾滅何必殷勤護薄紗早過天竺呈明智及同遊二老蟠雨夜靈峯臥竹床平明屐齒到雲堂門前雨過新溪滿石上風回舊草香山抱鐘聲圓不散雪鋪瓦面冷無光理公莫怪詩相惱今日偕行總姓湯次韻和酬契嵩㵎北夜依禪舍宿峯南今訪講師堂初行松路愛清曉及過石橋聞異香日色暖烘諸壑淨晴嵐翠潑幾峯光道標尚客何高趣更飲吾曹相葉湯次韻和酬惟晤曉過翻經臺下寺與君同謁祖師堂庭前紫桂葉頻脫石上紅梅花正香出洞陰雲分遠影挂松寒日漏清光謝君勸飯須無讓不許非時薦茗湯南㵎傍遊戲呈公濟冲晦契嵩相引朝來碧㵎傍山林雪盡水流長未應驚鳥下苔岸先共觀魚跨石梁日淡沙寒鷗自聚歲闌春入草含芳鮑昭湯老須同詠何必人間萬事忙次韻和酬蟠㵎南一嘯清風發林下重來白日長雲遠石深連鷲嶺水寒沙淺似魚梁漫因野老詢前事間伴伴幽人擷衆芳更欲窮源情未已知君嗔我索歸忙次韻和酬惟晤撥雲過得南隴去流水激濺一㵎長盤石誰堆補缺岸老自倒成危梁沙禽呼雌頻呌噪山藥吐色常芬芳臘去春歸山愈好喜君共無塵事忙遊天竺上寺呈東山仲靈冲晦蟠入林已欣猿鳥樂共傲浮生勝大還身外是非雲不繫社中留戀雨相關籃輿寂寞愧彭澤拄杖風流肖德山寄語葛洪嵒下水莫流清夢落人間次韻和酬契嵩共訪迢遙深塢寺仍隨野老賣樵還鳥栖已定人方到暮色雖濃門未關今宿嵒房休問法來朝臘屐重登山平生勝友殊難會莫厭相携寂寞間次韻和酬惟晤天寒雨細日將暮泥滑誰禁策馬還砂穴吐泉鳴決決竹叢歸鳥語關關聊睎謝客須穿屐莫羡支公獨買山方外論交情未淺願陪投老白雲間同公濟冲晦遊天竺兼簡呈伯周禪老契嵩愛此蕭然松塢深詩流邀我此相尋蒼茫寒日才開霧靉靆濃雲又結陰安石放懷還劇賞晈然乘興合清吟主人勸駐禪扉宿況值梅香正滿林次韻和酬蟠不問猿崖鳥道深携笻著屐伴君尋山中桂子驚寒夜雪後梅花逼歲陰欲住更逢青眼顧相看須盡白頭吟他年若續高僧傳未放湯休與道林次韻和酬惟晤平昔詩禪友契深更來人外事幽尋雨餘㵎壑流寒響歲晏柳杉老翠陰袒跣不妨陶令醉風流多效洛生吟山翁解榻延清賞未放前賢勝竹林宿天竺再贈東山禪師與冲晦蟠仲靈述作慚知己冲晦篇章竊賞音勝侶俱恬山水樂神交已過雪霜深燈前自笑平生事雨後重論一夜心相檢莫教詩間斷更闌同聽夜猿吟次韻奉和契嵩沈侯才雋冠儒林詩語驚人金玉音學海平生慚我淺詞源今日羡君深強睎老格須張膽喜聽清言更洗心賡唱苟能容纍句漫陪梁甫續高吟次韻奉和惟晤燈火青熒雲塢寺清猿呌斷有餘音檻梅雪白春風近山雨盆傾㵎水深背世迹憐高鳥迹結交心契老松心酬君秀句無新語徒攪詩腸徹曙吟宿天竺寺賦聞泉呈二老蟠我有泉中興平生愛水經山空時決決夜靜轉泠泠暗脈來湍急清聲出混冥月寒風不響高枕與君聽同賦聞泉契嵩歲晏林間宿初聞況夜晴漱寒醒客夢飛響應山鳴深㵎松風靜幽人石室清誰人能為我寫此入琴聲同賦聞泉惟晤㵎泉吾所好山舍寂無喧春脈生雲底夜聲來枕前風休不動竹月上未啼猿石上鳴逾急冷然清夢魂送公濟冲晦出山兼簡駐泊李思文契嵩幾日山遊霰雪稀相隨野老亦忘機始憐洞裏雲堪臥又憶人間歲杪歲夜落梅花應滿路風含春色自吹衣憑君為語王孫道音信終須寄鳥飛次韻奉酬蟠臘後東風掃翠微同看芳柳破春機三宵聽水都無夢四日登山未肯歸野老止憑雲送客家人應笑雨霑衣君詩兼簡佳公子只恐囊傾一夜飛次韻奉和惟晤招携緑野村邊去纍日青山曠世機惜向永安蘭若別還經靈隱渡頭歸雲峯積雪迷樵徑石罅新泉濺客衣詩會未由陪帝戚心隨雲鳥入城飛遊山歸遇雨呈仲靈冲晦蟠九里松門雪過時籃輿䙚䙚礙松枝雨留宿客還斜落風送行人亦倒吹華表忽驚黃鶴反耳中猶帶白猿悲來朝弗著登山屐可避君味謝客兒次韻和酬契嵩嚴維靈徹出山時避雨曾聞礙木枝歲杪霜寒何足畏管中春色已堪吹風含鐘韻凝還散水結溪聲咽又悲鬪草野遊君莫笑初平元是牧羊兒次韻奉和酬惟晤興高未肯輟清詩捨轎重扶櫛栗枝松柏青肥春雨洗烟雲輕健㵎風吹樵歸後塢連聲唱鹿過前溪失隊悲莫道還家甘寂默陶潛自有五男兒山中回憶東山老蟠山遊興發特尋君屐齒笻枝繞四鄰峯北看雲忘世務㵎南聽水得天真名高寂寞存僧史林下風流似晉人何日枇杷苦笋熟却遊未減去年春君去年有苦笋上批把熟之句次韻奉酬契嵩君事逍遙入亂雲與君躡屐遍溪鄰林間聽鳥聞偏好烟際觀山見匪真㵎水只能忙送客岩花不解久留人樂天更有龍門約勝會應須趁早春連得公濟出山道中見示二篇鄙思枯涸奉和不暇且乞罷唱契嵩詩篇留落野人窗又得虞卿璧一雙怪似蛟龍出古水清如日月浸秋江賡吟何止夸山澤變雅終須繫國邦為報詩家驍將道雪闌休唱已心降次韻奉酬蟠幾夕論詩坐石窗憐君百首妙無雙勾牽野興侵孤月惱亂詞源湧大江數紙忽然來竺嶺千年猶可照吳邦相思未免還相挑莫竪旗幡却詐降出山至中途寄永安禪師惟晤松行未盡却回頭寒雨雱𩃱已漸收望海閣邊雲繚繞行春橋下水奔流山庵驟別高談遠城寺將歸滿面羞須效著書同護法悠悠人事漫拘囚次韻和酬契嵩忽憶山中人白頭歲闌來看雪初收詩篇見賞皆高興謝客相隨匪俗流漫有嵓雲供夜臥況無土食備晨羞愛君吟詠殊堪聽金玉聲音勝楚囚公濟冲晦出山次日奉寄契嵩孫綽曾陪支遁遊千年人謂兩風流羡君慕此乘雙屐結侶還來共一丘衣冷雪霜猶未去興高雲月肯甘收耽詩重道皆無比應敵當時萬戶侯次韻奉酬蟠猿聲未落鳥聲愁筍發花開㵎水流還對春風驚節物漫思野老傍林丘古人得道多深隱賢守知名貴早收林下頻過君莫怪自看骨相匪封侯次韻奉酬惟晤今日追懷昨日遊二君乘興似奔流遠尋幽壑行拖屐纍到深雲臥枕丘崖竹蕭疏晴影亂塢梅零落晚香收會須重訪藤州老更約高才沈隱侯次韻奉和契嵩樂天已與廣宣遊更出風塵外俗流酒聖盡能非畢卓詩仙皆欲接浮丘間公濟與冲晦遊斷此葷酒多隨其奉戒篇章逸處江山動筆硯閒時雲雨收況有聲名俱籍甚並飛南北動王侯歲暮還西塢寄公濟無辨契嵩乘興溪邊去仍從林下歸梅香帶春信日色暖人衣白髮思還遠清流遇更稀野禽寧會意相顧向柴扉次韻奉和蟠聞說西庵好藤州恐不歸延年松可食避世草堪衣山塢雪應滾林端梅亦稀猶憐二禪老佳句及城扉次韻奉酬辨元野步溪流靜源深興未歸晚禽栖雪竹殘霰灑禪衣放意天涯遠狂吟人落稀詩成寄吾侶清氣動林扉次韻奉和惟晤白髮東山老青林西塢歸聽猿時駐錫厲水自褰衣高論才難敵孤蹤行亦稀慚君寄樵採佳句出嵓扉寄東山禪師蟠高臥西林月孤閒獨見君杖藜探㵎水欹枕看山雲鹿過何人見猿啼只自聞篇章知幾首寄我莫辭勤次韻奉酬契嵩翛然林下隱吾道異夫君習忍如幽草觀身類片雲人情無意染鶴唳有時聞謝客詩懷寄憐君此興勤蟠雪夜登湧金樓遠望西山憶仲靈灑然有邁世之風因思山陰王徽之雪夜獨酌四望皎然徘徊詠尤太冲招隱詩忽憶戴逵扁舟乘興余恨未能遂往聊寄此詩家占西湖島上雲雪光月色更侵魂興來爛漫投空老投或作心詩罷蒼茫眼正昏晉國衣冠何處覓梁朝殿閣儼猶存思君不及山陰夜遙望青松聽雪猿次韻奉酬契嵩暝色陰森雪和雲故人當此動吟魂烟凝火冷萬家靜水色山光竟夜昏興發晉賢前古遠詩傳蕭寺邇今存春歸嵒壑多芳樹漫欲遙君同聽猿寄勉冲晦速和拙什蟠冲晦僧儒詩者豪尤憐賴汝壯方袍一千篇興時無敵三十年功格最高白髮逢春今更勇清吟徹老莫辭勞何朝始肯將珠玉却報仙人換木桃次韻奉酬惟晤杜門誰復念吾曹老畏春寒擁毳袍懶慢從來徒自笑唱酬今更怯君高曾無道譽喧喧播厭把肝脾苦苦勞佳句忽來催野句譬將凡果逼仙桃新歲連雨不止因寄公濟兼簡賢令強公嵩寒郊才喜歲華新景物陰陰又一旬雲帶天低垂壓野雨藏春晝暗迷人寧愁燈火妨明月却嘆詩家惜令辰陶令而今臥江國倚樓吟望更誰親次韻和酬蟠林扉厭聽雨聲頻為惜春風只九旬裛撲山花將放杏侵尋歲月已過人何時好去遊南㵎每夜空來望北辰愁坐更無車馬客獨憐詩筆謾相親竊觀仲靈久雨詩且道余與公濟吟從之意輒次韻奉和至詩興勾牽日日新年光初破雨彌旬舊遊已得新工部佳句今逢休上人仲靈文章大手非特休比此比以詩言耳雲外馳心關水石江邊搔首望星辰泥深未愛尋山屐誰與西庵杖屨親重次元韻至吟思那知歲月新初鶯啼雨早經旬娟娟野竹通寒水洗洗江梅冷照人鷲嶺並遊勞夢寐虎溪一笑尚參辰千金褎字形篇尾迹未相同意已親又次韻奉寄強令契嵩冉冉流年年曆新仲春春日未盈旬何為萬里青雲士來問雙峯白髮人詩思雅驚含老格風神清爽惜芳辰況聞傲令陶元亮臘屐須來與我親重次韻奉酬至千年支許事如新欲寄前遊漫歷旬雨帶黑雲遮俗客猿呼飛鳥伴幽人從容劇論知何日感激佳篇慰此辰四海聲光非鑿齒道安名重若為親
